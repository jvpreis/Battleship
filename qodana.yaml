####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: jetbrains/qodana-jvm:2025.3
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses

failureConditions:
  severityThresholds:
    # Configurações para erros graves de Javadoc
    - severity: Critical   # Ou a severidade específica do seu linter para Javadoc graves
      count: 10
      inspections:
        - group: "category:Javadoc" # Use o grupo ou inspeção específica para Javadoc

    # Configurações para erros graves de Code Style
    - severity: Critical   # Ou a severidade específica do seu linter para Code Style graves
      count: 10
      inspections:
        - group: "category:Code style" # Use o grupo ou inspeção específica para Code Style
