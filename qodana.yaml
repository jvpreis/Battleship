####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: jetbrains/qodana-jvm:2025.3
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses

failureConditions:
  severityThresholds:
    # Limite total opcional (podes remover se quiseres separar apenas por tipo)
    critical: 20

  # Regras específicas por tipo de problema
  conditions:
    - metric: problems
      severity: CRITICAL
      threshold: 10
      group: "Javadoc"

    - metric: problems
      severity: CRITICAL
      threshold: 10
      group: "Code style"

exclude:
  - name: All
    paths:
      - build
      - out
      - node_modules
